server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Install script — serve as plain text, never fall through to SPA
    location = /install {
        default_type text/plain;
        add_header Content-Disposition "inline";
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Uninstall script — same plain-text, no-cache handling as /install so
    # `curl -fsSL https://gctrl.tech/uninstall | bash` always fetches it fresh.
    location = /uninstall {
        default_type text/plain;
        add_header Content-Disposition "inline";
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Docker Compose template — served to the installer
    location = /compose.yml {
        default_type text/plain;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite-hashed bundles — filename changes on every build, safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files (logos, favicons, hero image) have STABLE filenames
    # but mutable content (rebrands, redeploys). They must NEVER be immutable:
    # "immutable, 1y" here poisoned browser caches for a year — after a logo
    # swap, clients kept rendering the old SVGs until a hard refresh. no-cache
    # still allows storing, but revalidates via ETag (cheap 304s, instant updates).
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        add_header Cache-Control "no-cache";
    }

    # Never cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
