server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Install script — serve as plain text, never fall through to SPA
    location = /install {
        default_type text/plain;
        add_header Content-Disposition "inline";
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Uninstall script — same plain-text, no-cache handling as /install so
    # `curl -fsSL https://gctrl.tech/uninstall | bash` always fetches it fresh.
    location = /uninstall {
        default_type text/plain;
        add_header Content-Disposition "inline";
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Docker Compose template — served to the installer
    location = /compose.yml {
        default_type text/plain;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # SEO / crawler assets — served as-is from dist/, but crawlers should
    # always see the latest copy rather than a stale cached one.
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "no-cache";
    }

    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    # Agent skill (canonical text mirrored from services/api-rs MEMORY_SKILL_MD) —
    # served plain-text/no-cache like the install script so agents/CLIs always
    # fetch the current version, never a stale cached copy.
    location = /skill.md {
        default_type text/markdown;
        add_header Cache-Control "no-cache";
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Any remaining internal redirect stays relative + https (never downgrade to
    # http:// or leak the container port) — belt-and-suspenders behind a TLS proxy.
    absolute_redirect off;
    port_in_redirect off;

    # SPA + SSG: prerendered routes live at <route>/index.html (vite-react-ssg
    # nested-dir output). Serve that HTML directly for the no-trailing-slash URL
    # so /docs/tech-kex returns 200 with real content instead of a 301 →
    # /docs/tech-kex/ (which also mismatched the canonical + sitemap, both
    # slash-less). $uri.html covers any flat prerender; /index.html is the SPA
    # fallback for non-prerendered (auth/app) routes.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Vite-hashed bundles — filename changes on every build, safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files (logos, favicons, hero image) have STABLE filenames
    # but mutable content (rebrands, redeploys). They must NEVER be immutable:
    # "immutable, 1y" here poisoned browser caches for a year — after a logo
    # swap, clients kept rendering the old SVGs until a hard refresh. no-cache
    # still allows storing, but revalidates via ETag (cheap 304s, instant updates).
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        add_header Cache-Control "no-cache";
    }

    # Never cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
