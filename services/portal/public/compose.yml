# Ground Control — Customer Stack
# Generated by installer. Do not edit directly — re-run install to regenerate.
# Profiles: bundled-neo4j, bundled-qdrant, bundled-ollama, bundled-llamacpp, bundled-vllm
#   Activated automatically by the installer for each service not detected on the host.

services:
  gctrl-agent:
    image: ghcr.io/gctrl-tech/agent:latest
    # Rust service — amd64 image; runs natively on amd64 and via Rosetta 2 on
    # Apple Silicon. Pinned so Docker doesn't warn about a missing arm64 variant.
    platform: linux/amd64
    container_name: gctrl-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:7070:7070"
    volumes:
      - ./config:/app/config:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GCTRL_LICENSE_JWT_PATH=/app/config/license.jwt
      - GCTRL_LICENSE_PUBLIC_KEY_FILE=/app/config/license.pub
      - GCTRL_API_URL=${GCTRL_API_URL:-https://api.gctrl.tech}
      - GCTRL_COMPOSE_FILE=/app/docker-compose.yml
      - GCTRL_NETWORK=gctrl
      # Gates POST /recreate (used by the api to swap itself onto its new image
      # during a self-update — see api-rs update.rs). Same trust boundary as the
      # api/kex/fuse INTERNAL_API_SECRET pattern; empty = grace (no check).
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-}
    networks:
      - gctrl
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7070/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  gctrl-kex:
    image: ghcr.io/gctrl-tech/kex:latest
    container_name: gctrl-kex
    restart: unless-stopped
    ports:
      - "127.0.0.1:4010:4010"
    environment:
      - OLLAMA_BASE=${OLLAMA_BASE:-http://gctrl-ollama:11434}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - NEO4J_URI=${NEO4J_URI:-bolt://gctrl-neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - REDIS_URL=redis://gctrl-redis:6379
      - QDRANT_URL=${QDRANT_URL:-http://gctrl-qdrant:6333}
      - QDRANT_COLLECTION=gctrl_chunks
      - EMBEDDING_MODEL=nomic-embed-text
      # Default bi-encoder GLiNER is baked into the image; these are operator
      # overrides (empty = image default). Kept in lockstep with the deploy
      # template + dev compose (the install_scripts drift gate enforces this).
      - GLINER_MODEL=${GLINER_MODEL:-}
      - GLINER_FALLBACK_MODEL=${GLINER_FALLBACK_MODEL:-}
      - NER_THRESHOLD_BI=${NER_THRESHOLD_BI:-}
      - PHOENIX_OTLP_URL=${PHOENIX_OTLP_URL:-}
      - PHOENIX_SERVICE_NAME=gctrl-kex
      # Generation model the installer's model-picker selected (pulled into Ollama).
      - RELEX_MODEL=${RELEX_MODEL:-qwen2.5:7b}
      - AUTO_CLASSIFY_MODEL=${AUTO_CLASSIFY_MODEL:-llama3.2}
      - PG_URL=postgresql://gctrl:${POSTGRES_PASSWORD:-gctrl-postgres-password}@gctrl-postgres:5432/gctrl
      - PORT=4010
      # Internal trust boundary: /search takes a caller-supplied user_id, so when set
      # it requires this shared secret (api-rs sends it). Empty = grace (no check).
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-}
      # Opt-in NER precision tier: an extra LLM pass verifies/retypes GLiNER
      # candidates (drops over-extraction junk) using the configured generation
      # model. Default OFF — it trades ~5pt detection-recall for precision and
      # adds ~1 LLM call/doc; GRAPH_PRUNE_ISOLATED already curates the graph.
      # Set true only for RAG-heavy installs that want cleaner entity_mentions.
      - KEX_ENTITY_VERIFY=${KEX_ENTITY_VERIFY:-false}
    volumes:
      - gctrl-kex-models:/app/models
    depends_on:
      gctrl-agent:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl

  # FUSE resolution engine — ALWAYS deployed (GCTRL's own engine, not something a
  # host would already be running). FUSE's high-precision entity-resolution stage
  # talks to it; without it FUSE degrades to a slower fallback matcher. Multi-arch
  # image (native on Apple Silicon).
  gctrl-resolver:
    image: ghcr.io/gctrl-tech/fusion-engine:latest
    container_name: gctrl-resolver
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx2G
    command: ["-s"]
    networks:
      - gctrl

  gctrl-fuse:
    image: ghcr.io/gctrl-tech/fuse:latest
    container_name: gctrl-fuse
    restart: unless-stopped
    ports:
      - "127.0.0.1:4020:4020"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://gctrl-neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - REDIS_URL=redis://gctrl-redis:6379
      - PORT=4020
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-}
      - SIMILARITY_THRESHOLD=0.85
      - RESOLVER_URL=http://gctrl-resolver:8080
      # Distill needs Postgres (compilations), Qdrant (grounding chunks) and an
      # Ollama (wiki prose). Without these, distill fails to resolve hostnames or
      # produces no prose. Mirror the api/kex service names.
      - PG_URL=postgresql://gctrl:${POSTGRES_PASSWORD:-gctrl-postgres-password}@gctrl-postgres:5432/gctrl
      - QDRANT_URL=${QDRANT_URL:-http://gctrl-qdrant:6333}
      - OLLAMA_BASE=${OLLAMA_BASE:-http://gctrl-ollama:11434}
      - GCTRL_DISTILL_MODEL=${GCTRL_DISTILL_MODEL:-llama3.2}
      - PHOENIX_OTLP_URL=${PHOENIX_OTLP_URL:-}
      - PHOENIX_SERVICE_NAME=gctrl-fuse
    depends_on:
      gctrl-agent:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl

  gctrl-api:
    image: ghcr.io/gctrl-tech/api:latest
    # Rust service — amd64 image; native on amd64, Rosetta 2 on Apple Silicon.
    platform: linux/amd64
    container_name: gctrl-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://gctrl:${POSTGRES_PASSWORD:-gctrl-postgres-password}@gctrl-postgres:5432/gctrl
      - REDIS_URL=redis://gctrl-redis:6379
      - NEO4J_URI=${NEO4J_URI:-bolt://gctrl-neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3001
      - KEX_WORKER_URL=http://gctrl-kex:4010
      # Without this the API defaults FUSE to localhost:4020 (= itself, in the
      # container) → "FUSE unreachable" and distill/fuse fail out of the box.
      - FUSE_URL=http://gctrl-fuse:4020
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-}
      - QDRANT_URL=${QDRANT_URL:-http://gctrl-qdrant:6333}
      - OLLAMA_BASE=${OLLAMA_BASE:-http://gctrl-ollama:11434}
      - PHOENIX_OTLP_URL=${PHOENIX_OTLP_URL:-}
      - PHOENIX_SERVICE_NAME=gctrl-api
    depends_on:
      gctrl-postgres:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl

  gctrl-web:
    image: ghcr.io/gctrl-tech/web:latest
    container_name: gctrl-web
    restart: unless-stopped
    ports:
      - "3001:80"
    labels:
      - "org.opencontainers.image.title=Ground Control"
      - "org.opencontainers.image.description=Knowledge Graph Platform — open http://localhost:3001"
      - "org.opencontainers.image.url=http://localhost:3001"
    depends_on:
      - gctrl-api
    networks:
      - gctrl

  # ── Always-bundled services ────────────────────────────────────────────────────

  gctrl-postgres:
    image: postgres:16-alpine
    container_name: gctrl-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gctrl
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gctrl-postgres-password}
      - POSTGRES_DB=gctrl
    volumes:
      - gctrl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gctrl"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gctrl

  gctrl-redis:
    image: redis:7-alpine
    container_name: gctrl-redis
    restart: unless-stopped
    volumes:
      - gctrl-redisdata:/data
    networks:
      - gctrl

  # ── Profile-gated: only deployed when not detected on host ────────────────────

  gctrl-neo4j:
    image: neo4j:5-community
    container_name: gctrl-neo4j
    restart: unless-stopped
    profiles: [bundled-neo4j]
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - gctrl-neo4jdata:/data
    networks:
      - gctrl

  gctrl-qdrant:
    image: qdrant/qdrant:latest
    container_name: gctrl-qdrant
    restart: unless-stopped
    profiles: [bundled-qdrant]
    volumes:
      - gctrl-qdrantdata:/qdrant/storage
    networks:
      - gctrl

  gctrl-ollama:
    image: ollama/ollama:latest
    container_name: gctrl-ollama
    restart: unless-stopped
    profiles: [bundled-ollama]
    # NO host port publish on purpose: the GCTRL services reach this Ollama over the
    # compose network as `gctrl-ollama:11434` (see OLLAMA_BASE), which needs no host
    # port. Publishing 127.0.0.1:11434 would COLLIDE with a native Ollama already on
    # that port and abort the install. To talk to it from the host, use
    # `docker exec gctrl-ollama ollama ...`.
    volumes:
      - gctrl-ollama-models:/root/.ollama
    networks:
      - gctrl

  # ── Optional high-performance runtime: llama.cpp (OpenAI-compatible /v1) ────────
  # Pulled ONLY when the operator selects it (profile bundled-llamacpp), so the
  # default download stays small. Serves generation at gctrl-llamacpp:8080/v1; the
  # GCTRL runtime is then provider=openai_compatible, base http://gctrl-llamacpp:8080.
  # llama-server self-downloads the GGUF from HuggingFace via `-hf repo:quant`.
  gctrl-llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-b9538
    container_name: gctrl-llamacpp
    restart: unless-stopped
    profiles: [bundled-llamacpp]
    command: >-
      -hf ${LLAMACPP_MODEL:-bartowski/Qwen2.5-3B-Instruct-GGUF:Q4_K_M}
      --host 0.0.0.0 --port 8080 -c 8192
    volumes:
      - gctrl-llamacpp-models:/root/.cache
    networks:
      - gctrl
  # Pinned embedding sidecar (nomic-embed-text, dim 768) so embeddings can ride the
  # same runtime while staying vector-compatible with the bundled-Ollama default.
  # Wired into KEX/FUSE in Phase 6; harmless when unused.
  gctrl-llamacpp-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-b9538
    container_name: gctrl-llamacpp-embed
    restart: unless-stopped
    profiles: [bundled-llamacpp]
    command: >-
      --embeddings -hf ${LLAMACPP_EMBED_MODEL:-nomic-ai/nomic-embed-text-v1.5-GGUF:Q4_K_M}
      --host 0.0.0.0 --port 8081 -c 2048
    volumes:
      - gctrl-llamacpp-models:/root/.cache
    networks:
      - gctrl

  # ── Optional GPU-only runtime: vLLM (OpenAI-compatible /v1) ─────────────────
  # Pulled ONLY when the operator selects it (profile bundled-vllm, requires an
  # NVIDIA GPU + nvidia-container-toolkit). Serves generation at
  # gctrl-vllm:8000/v1; the GCTRL runtime is then provider=openai_compatible,
  # base http://gctrl-vllm:8000. vLLM downloads the model from HuggingFace Hub
  # on first start (models cached in gctrl-vllm-models volume).
  gctrl-vllm:
    image: vllm/vllm-openai:latest
    container_name: gctrl-vllm
    restart: unless-stopped
    profiles: [bundled-vllm]
    command: >-
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-3B-Instruct}
      --host 0.0.0.0 --port 8000
    volumes:
      - gctrl-vllm-models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - gctrl

volumes:
  gctrl-pgdata:
  gctrl-redisdata:
  gctrl-neo4jdata:
  gctrl-qdrantdata:
  gctrl-kex-models:
  gctrl-ollama-models:
  gctrl-llamacpp-models:
  gctrl-vllm-models:

networks:
  gctrl:
    driver: bridge
