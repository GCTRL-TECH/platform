server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite-hashed bundles — filename changes on every build, safe to cache forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static files (logos, favicons, fonts) have STABLE filenames but
    # mutable content (rebrands, redeploys). They must NEVER be immutable:
    # "immutable, 1y" here poisoned browser caches for a year — after the logo
    # swap, clients kept rendering the old SVGs until a hard refresh. no-cache
    # still allows storing, but revalidates via ETag (cheap 304s, instant updates).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # No file size limit for uploads
    client_max_body_size 0;

    # Installer scripts — served as plain text
    location ~ ^/(install|update|uninstall|rollback)$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # API proxy.
    # Resolve the api upstream dynamically via Docker's embedded DNS (127.0.0.11)
    # using a variable in proxy_pass — otherwise nginx caches the api container's
    # IP at startup and returns 502 the moment the api container is recreated
    # (e.g. after a rebuild/deploy) with a new IP.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $upstream_api gctrl-api;
        proxy_pass http://$upstream_api:4000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — all non-file routes serve index.html.
    # index.html must NOT be cached: it references the hashed asset bundles, so a
    # stale cached index.html keeps loading an old build (changes appear missing).
    # Hashed JS/CSS above stay immutable; only this entry document revalidates.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
