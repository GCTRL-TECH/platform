name: Build, Obfuscate, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: gctrl-tech
  # Release version string for this build. Tagged onto every customer image as
  # :v<VERSION> and published to the license API by the publish-version job.
  VERSION: 0.1.${{ github.run_number }}

# Use the built-in GITHUB_TOKEN to push to GHCR (no expiring PAT). Granted at the
# workflow level so every build job can publish packages.
permissions:
  contents: read
  packages: write

jobs:
  # ── Detect which services actually changed ──────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      kex:        ${{ steps.filter.outputs.kex }}
      fuse:       ${{ steps.filter.outputs.fuse }}
      agent:      ${{ steps.filter.outputs.agent }}
      api:        ${{ steps.filter.outputs.api }}
      web:        ${{ steps.filter.outputs.web }}
      portal:     ${{ steps.filter.outputs.portal }}
      license-api: ${{ steps.filter.outputs.license-api }}
      fusion:     ${{ steps.filter.outputs.fusion }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kex:
              - 'services/kex/**'
            fuse:
              - 'services/fuse/**'
            agent:
              - 'services/agent-rs/**'
            api:
              - 'services/api-rs/**'
            web:
              - 'services/web/**'
            portal:
              - 'services/portal/**'
            license-api:
              - 'services/license-api/**'
            fusion:
              - 'services/fusion-engine/**'

  # ── Build jobs — each only runs when its source changed ────────────────────
  # workflow_dispatch (manual trigger) always builds everything.

  build-kex:
    needs: changes
    if: needs.changes.outputs.kex == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Default kex:latest — CPU, multi-arch (native on Apple Silicon).
          - variant: cpu
            file: services/kex/build/Dockerfile.prod.cpu
            platforms: linux/amd64,linux/arm64
            tag_suffix: ""
          # kex:latest-cuda — NVIDIA GPU hosts only (amd64).
          - variant: cuda
            file: services/kex/build/Dockerfile.prod
            platforms: linux/amd64
            tag_suffix: "-cuda"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/kex
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/gctrl-tech/kex:latest${{ matrix.tag_suffix }}
            ghcr.io/gctrl-tech/kex:${{ github.sha }}${{ matrix.tag_suffix }}
            ghcr.io/gctrl-tech/kex:v${{ env.VERSION }}${{ matrix.tag_suffix }}

  build-fuse:
    needs: changes
    if: needs.changes.outputs.fuse == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Default fuse:latest — CPU, multi-arch (native on Apple Silicon).
          - variant: cpu
            torch_index: https://download.pytorch.org/whl/cpu
            platforms: linux/amd64,linux/arm64
            tag_suffix: ""
          # fuse:latest-cuda — NVIDIA GPU hosts only (amd64).
          - variant: cuda
            torch_index: https://download.pytorch.org/whl/cu121
            platforms: linux/amd64
            tag_suffix: "-cuda"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/fuse
          file: services/fuse/build/Dockerfile.prod
          platforms: ${{ matrix.platforms }}
          build-args: TORCH_INDEX_URL=${{ matrix.torch_index }}
          push: true
          tags: |
            ghcr.io/gctrl-tech/fuse:latest${{ matrix.tag_suffix }}
            ghcr.io/gctrl-tech/fuse:${{ github.sha }}${{ matrix.tag_suffix }}
            ghcr.io/gctrl-tech/fuse:v${{ env.VERSION }}${{ matrix.tag_suffix }}

  build-license-api:
    needs: changes
    if: needs.changes.outputs['license-api'] == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/license-api
          file: services/license-api/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/license-api:latest
            ghcr.io/gctrl-tech/license-api:${{ github.sha }}

  build-agent-rs:
    needs: changes
    if: needs.changes.outputs.agent == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check agent-rs (show real errors)
        run: cd services/agent-rs && cargo check 2>&1
      - name: Build and push agent (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/agent-rs
          push: true
          tags: |
            ghcr.io/gctrl-tech/agent:latest
            ghcr.io/gctrl-tech/agent:${{ github.sha }}
            ghcr.io/gctrl-tech/agent:v${{ env.VERSION }}

  build-api-rs:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check api-rs (show real errors)
        run: cd services/api-rs && cargo check 2>&1
      - name: Build and push api (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-rs
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/gctrl-tech/api:latest
            ghcr.io/gctrl-tech/api:${{ github.sha }}
            ghcr.io/gctrl-tech/api:v${{ env.VERSION }}

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/web
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/gctrl-tech/web:latest
            ghcr.io/gctrl-tech/web:${{ github.sha }}
            ghcr.io/gctrl-tech/web:v${{ env.VERSION }}

  # ── Fusion Engine (LIMES resolver) — multi-arch off the committed jar ───────
  build-fusion-engine:
    needs: changes
    if: needs.changes.outputs.fusion == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # pull the real limes.jar (LFS), not the pointer
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/fusion-engine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/gctrl-tech/fusion-engine:latest
            ghcr.io/gctrl-tech/fusion-engine:${{ github.sha }}
            ghcr.io/gctrl-tech/fusion-engine:v${{ env.VERSION }}

  build-portal:
    needs: changes
    if: needs.changes.outputs.portal == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/portal
          build-args: |
            VITE_API_URL=https://api.gctrl.tech
            VITE_UMAMI_SCRIPT_URL=https://analytics.gctrl.tech/script.js
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID }}
          push: true
          tags: |
            ghcr.io/gctrl-tech/portal:latest
            ghcr.io/gctrl-tech/portal:${{ github.sha }}

  # ── Publish the new version to the license API (best-effort) ───────────────
  # Runs after the customer-image builds on push to main. Best-effort: a publish
  # hiccup must never red-X the build, so the curl is non-fatal. The version
  # string matches the :v<VERSION> image tag (0.1.<run_number>).
  publish-version:
    needs:
      - build-kex
      - build-fuse
      - build-agent-rs
      - build-api-rs
      - build-web
      - build-fusion-engine
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Never let a publish hiccup fail the overall build — it's best-effort.
    continue-on-error: true
    steps:
      - name: Publish version to license API
        # Pass the commit message + token through the ENV, never inline ${{ }} into
        # the shell — a message with quotes/parens/newlines would otherwise break
        # the script (syntax error), and inlining secrets/user text is unsafe.
        env:
          VERSION: 0.1.${{ github.run_number }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PUBLISH_TOKEN: ${{ secrets.VERSION_PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "VERSION_PUBLISH_TOKEN not set — skipping version publish (non-fatal)"
            exit 0
          fi
          MSG=$(printf '%s' "$COMMIT_MSG" | head -1)
          BODY=$(jq -nc --arg v "$VERSION" --arg c "$MSG" '{version:$v, changelog:$c, channel:"stable"}')
          curl -fsSL -m 20 -X POST https://api.gctrl.tech/v1/versions \
            -H "Authorization: Bearer $PUBLISH_TOKEN" \
            -H "Content-Type: application/json" -d "$BODY" \
            || echo "version publish skipped/failed (non-fatal)"

  # ── Deploy jobs — only run if their upstream build ran ─────────────────────

  deploy-portal:
    needs: [build-license-api, build-portal]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.build-license-api.result == 'success' || needs.build-portal.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy portal + license-api to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /docker/gctrl
            echo "$GHCR_TOKEN" | docker login ghcr.io -u TortillaJackson --password-stdin || echo "ghcr login skipped (images are public)"

            sed -i 's|image: ghcr.io/gctrl-tech/web:latest|image: ghcr.io/gctrl-tech/portal:latest|' docker-compose.yml

            docker compose -f docker-compose.yml pull gctrl-api gctrl-web
            docker compose -f docker-compose.yml up -d gctrl-api gctrl-web

            echo "=== Portal containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep -E "NAME|gctrl-api|gctrl-web"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  deploy-vps:
    needs: [deploy-portal, build-api-rs]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-api-rs.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Rust API to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u TortillaJackson --password-stdin || echo "ghcr login skipped (images are public)"

            docker pull ghcr.io/gctrl-tech/api:latest
            GCTRL_NET=$(docker inspect gctrl-db --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null | head -1)
            GCTRL_NET=${GCTRL_NET:-gctrl}
            docker rm -f gctrl-app 2>/dev/null || true
            docker run -d \
              --name gctrl-app \
              --network "$GCTRL_NET" \
              --restart unless-stopped \
              -e PORT=4000 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e REDIS_URL="redis://gctrl-redis:6379" \
              -e NEO4J_URI="bolt://localhost:7687" \
              -e NEO4J_USER=neo4j \
              -e NEO4J_PASSWORD=none \
              -e JWT_SECRET="$JWT_SECRET" \
              -e JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET" \
              -e FRONTEND_URL="https://gctrl.tech" \
              ghcr.io/gctrl-tech/api:latest

            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  update-deploy-repo:
    needs: deploy-vps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: gctrl-tech/deploy
          token: ${{ secrets.GHCR_TOKEN }}
          path: deploy-repo
      - name: Update version tag in installer
        run: |
          cd deploy-repo
          sed -i "s/GCTRL_VERSION=.*/GCTRL_VERSION=${{ github.sha }}/" install.sh
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -am "chore: update to ${{ github.sha }}" || echo "No changes"
          git push
