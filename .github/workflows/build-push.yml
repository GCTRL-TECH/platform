name: Build, Obfuscate, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: gctrl-tech

jobs:
  build-kex:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/kex
          file: services/kex/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/kex:latest
            ghcr.io/gctrl-tech/kex:${{ github.sha }}

  build-fuse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/fuse
          file: services/fuse/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/fuse:latest
            ghcr.io/gctrl-tech/fuse:${{ github.sha }}

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/license-api
          file: services/license-api/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/license-api:latest
            ghcr.io/gctrl-tech/license-api:${{ github.sha }}

  # build-agent (Node.js) - replaced by Rust build below
  # build-agent:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     packages: write
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: docker/login-action@v3
  #       with:
  #         registry: ghcr.io
  #         username: TortillaJackson
  #         password: ${{ secrets.GHCR_TOKEN }}
  #     - uses: docker/build-push-action@v5
  #       with:
  #         context: services/agent
  #         file: services/agent/build/Dockerfile.prod
  #         push: true
  #         tags: |
  #           ghcr.io/gctrl-tech/agent:latest
  #           ghcr.io/gctrl-tech/agent:${{ github.sha }}

  build-agent-rs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push agent (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/agent-rs
          push: true
          tags: |
            ghcr.io/gctrl-tech/agent:latest
            ghcr.io/gctrl-tech/agent:${{ github.sha }}

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/web
          push: true
          tags: |
            ghcr.io/gctrl-tech/web:latest
            ghcr.io/gctrl-tech/web:${{ github.sha }}

  # build-app (Node.js) - replaced by Rust build below
  # build-app:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     packages: write
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: docker/login-action@v3
  #       with:
  #         registry: ghcr.io
  #         username: TortillaJackson
  #         password: ${{ secrets.GHCR_TOKEN }}
  #     - uses: docker/build-push-action@v5
  #       with:
  #         context: services/api
  #         file: services/api/build/Dockerfile.prod
  #         push: true
  #         tags: |
  #           ghcr.io/gctrl-tech/app:latest
  #           ghcr.io/gctrl-tech/app:${{ github.sha }}

  build-api-rs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push api (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-rs
          push: true
          tags: |
            ghcr.io/gctrl-tech/api:latest
            ghcr.io/gctrl-tech/api:${{ github.sha }}

  build-portal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/portal
          build-args: VITE_API_URL=https://api.gctrl.tech
          push: true
          tags: |
            ghcr.io/gctrl-tech/portal:latest
            ghcr.io/gctrl-tech/portal:${{ github.sha }}

  deploy-vps:
    needs: [build-api, build-portal, build-api-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /docker/gctrl
            echo "$GHCR_TOKEN" | docker login ghcr.io -u TortillaJackson --password-stdin

            # Update gctrl-web to use portal image
            sed -i 's|image: ghcr.io/gctrl-tech/web:latest|image: ghcr.io/gctrl-tech/portal:latest|' docker-compose.yml

            # Refresh license-api and portal
            docker compose -f docker-compose.yml pull gctrl-api gctrl-web
            docker compose -f docker-compose.yml up -d gctrl-api gctrl-web

            # Update borghive api container (Rust)
            docker pull ghcr.io/gctrl-tech/api:latest
            GCTRL_NET=$(docker inspect gctrl-db --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null | head -1)
            GCTRL_NET=${GCTRL_NET:-gctrl}
            docker rm -f gctrl-app 2>/dev/null || true
            docker run -d \
              --name gctrl-app \
              --network "$GCTRL_NET" \
              --restart unless-stopped \
              -e PORT=4000 \
              -e DATABASE_URL="postgresql://borghive:borghive@gctrl-app-db:5432/borghive" \
              -e REDIS_URL="redis://gctrl-redis:6379" \
              -e NEO4J_URI="bolt://localhost:7687" \
              -e NEO4J_USER=neo4j \
              -e NEO4J_PASSWORD=none \
              -e JWT_SECRET="${JWT_SECRET:-gctrl-jwt-secret-change-me}" \
              -e JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET:-gctrl-jwt-refresh-change-me}" \
              -e FRONTEND_URL="https://gctrl.tech" \
              ghcr.io/gctrl-tech/api:latest

            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  update-deploy-repo:
    needs: deploy-vps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: gctrl-tech/deploy
          token: ${{ secrets.GHCR_TOKEN }}
          path: deploy-repo
      - name: Update version tag in installer
        run: |
          cd deploy-repo
          sed -i "s/GCTRL_VERSION=.*/GCTRL_VERSION=${{ github.sha }}/" install.sh
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -am "chore: update to ${{ github.sha }}" || echo "No changes"
          git push
