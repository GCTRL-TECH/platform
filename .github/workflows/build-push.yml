name: Build, Obfuscate, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: gctrl-tech

jobs:
  # ── Detect which services actually changed ──────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      kex:        ${{ steps.filter.outputs.kex }}
      fuse:       ${{ steps.filter.outputs.fuse }}
      agent:      ${{ steps.filter.outputs.agent }}
      api:        ${{ steps.filter.outputs.api }}
      web:        ${{ steps.filter.outputs.web }}
      portal:     ${{ steps.filter.outputs.portal }}
      license-api: ${{ steps.filter.outputs.license-api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kex:
              - 'services/kex/**'
            fuse:
              - 'services/fuse/**'
            agent:
              - 'services/agent-rs/**'
            api:
              - 'services/api-rs/**'
            web:
              - 'services/web/**'
            portal:
              - 'services/portal/**'
            license-api:
              - 'services/license-api/**'

  # ── Build jobs — each only runs when its source changed ────────────────────
  # workflow_dispatch (manual trigger) always builds everything.

  build-kex:
    needs: changes
    if: needs.changes.outputs.kex == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/kex
          file: services/kex/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/kex:latest
            ghcr.io/gctrl-tech/kex:${{ github.sha }}

  build-fuse:
    needs: changes
    if: needs.changes.outputs.fuse == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: cpu
            torch_index: https://download.pytorch.org/whl/cpu
            tag_suffix: ""
          - variant: cuda
            torch_index: https://download.pytorch.org/whl/cu121
            tag_suffix: "-cuda"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/fuse
          file: services/fuse/build/Dockerfile.prod
          build-args: TORCH_INDEX_URL=${{ matrix.torch_index }}
          push: true
          tags: |
            ghcr.io/gctrl-tech/fuse:latest${{ matrix.tag_suffix }}
            ghcr.io/gctrl-tech/fuse:${{ github.sha }}${{ matrix.tag_suffix }}

  build-license-api:
    needs: changes
    if: needs.changes.outputs['license-api'] == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/license-api
          file: services/license-api/build/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/gctrl-tech/license-api:latest
            ghcr.io/gctrl-tech/license-api:${{ github.sha }}

  build-agent-rs:
    needs: changes
    if: needs.changes.outputs.agent == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check agent-rs (show real errors)
        run: cd services/agent-rs && cargo check 2>&1
      - name: Build and push agent (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/agent-rs
          push: true
          tags: |
            ghcr.io/gctrl-tech/agent:latest
            ghcr.io/gctrl-tech/agent:${{ github.sha }}

  build-api-rs:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check api-rs (show real errors)
        run: cd services/api-rs && cargo check 2>&1
      - name: Build and push api (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-rs
          push: true
          tags: |
            ghcr.io/gctrl-tech/api:latest
            ghcr.io/gctrl-tech/api:${{ github.sha }}

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/web
          push: true
          tags: |
            ghcr.io/gctrl-tech/web:latest
            ghcr.io/gctrl-tech/web:${{ github.sha }}

  build-portal:
    needs: changes
    if: needs.changes.outputs.portal == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: TortillaJackson
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/portal
          build-args: VITE_API_URL=https://api.gctrl.tech
          push: true
          tags: |
            ghcr.io/gctrl-tech/portal:latest
            ghcr.io/gctrl-tech/portal:${{ github.sha }}

  # ── Deploy jobs — only run if their upstream build ran ─────────────────────

  deploy-portal:
    needs: [build-license-api, build-portal]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.build-license-api.result == 'success' || needs.build-portal.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy portal + license-api to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /docker/gctrl
            echo "$GHCR_TOKEN" | docker login ghcr.io -u TortillaJackson --password-stdin

            sed -i 's|image: ghcr.io/gctrl-tech/web:latest|image: ghcr.io/gctrl-tech/portal:latest|' docker-compose.yml

            docker compose -f docker-compose.yml pull gctrl-api gctrl-web
            docker compose -f docker-compose.yml up -d gctrl-api gctrl-web

            echo "=== Portal containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep -E "NAME|gctrl-api|gctrl-web"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  deploy-vps:
    needs: [deploy-portal, build-api-rs]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-api-rs.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Rust API to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u TortillaJackson --password-stdin

            docker pull ghcr.io/gctrl-tech/api:latest
            GCTRL_NET=$(docker inspect gctrl-db --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null | head -1)
            GCTRL_NET=${GCTRL_NET:-gctrl}
            docker rm -f gctrl-app 2>/dev/null || true
            docker run -d \
              --name gctrl-app \
              --network "$GCTRL_NET" \
              --restart unless-stopped \
              -e PORT=4000 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e REDIS_URL="redis://gctrl-redis:6379" \
              -e NEO4J_URI="bolt://localhost:7687" \
              -e NEO4J_USER=neo4j \
              -e NEO4J_PASSWORD=none \
              -e JWT_SECRET="$JWT_SECRET" \
              -e JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET" \
              -e FRONTEND_URL="https://gctrl.tech" \
              ghcr.io/gctrl-tech/api:latest

            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  update-deploy-repo:
    needs: deploy-vps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: gctrl-tech/deploy
          token: ${{ secrets.GHCR_TOKEN }}
          path: deploy-repo
      - name: Update version tag in installer
        run: |
          cd deploy-repo
          sed -i "s/GCTRL_VERSION=.*/GCTRL_VERSION=${{ github.sha }}/" install.sh
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -am "chore: update to ${{ github.sha }}" || echo "No changes"
          git push
