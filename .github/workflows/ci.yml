name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-web:
    name: Typecheck Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - run: cd services/web && npm ci
      - run: cd services/web && npx tsc --noEmit

  typecheck-agent:
    name: Typecheck Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/agent/package-lock.json
      - run: cd services/agent && npm ci
      - run: cd services/agent && npx tsc --noEmit

  typecheck-license-api:
    name: Typecheck License API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/license-api/package-lock.json
      - run: cd services/license-api && npm ci
      - run: cd services/license-api && npx tsc --noEmit

  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/agent/package-lock.json
      - run: cd services/agent && npm ci
      - run: cd services/agent && npm test
