version: "3.8"

# Ground Control — Customer Stack
# Generated by installer. Do not edit directly — re-run install to regenerate.

services:
  gctrl-agent:
    image: ghcr.io/gctrl/agent:latest
    container_name: gctrl-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:7070:7070"
    volumes:
      - ./config:/app/config:ro
    environment:
      - GCTRL_LICENSE_JWT_PATH=/app/config/license.jwt
      - GCTRL_LICENSE_PUBLIC_KEY=${GCTRL_LICENSE_PUBLIC_KEY}
      - GCTRL_API_URL=${GCTRL_API_URL:-https://api.gctrl.tech}
    networks:
      - gctrl
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7070/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  gctrl-kex:
    image: ghcr.io/gctrl/kex:latest
    container_name: gctrl-kex
    restart: unless-stopped
    ports:
      - "127.0.0.1:4010:4010"
    environment:
      - OLLAMA_BASE=http://ollama:11434
      - NEO4J_URI=bolt://gctrl-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - REDIS_URL=redis://gctrl-redis:6379
      - QDRANT_URL=http://gctrl-qdrant:6333
      - QDRANT_COLLECTION=gctrl_chunks
      - EMBEDDING_MODEL=nomic-embed-text
      - PG_URL=postgresql://gctrl:${POSTGRES_PASSWORD:-gctrl-postgres-password}@gctrl-postgres:5432/gctrl
      - PORT=4010
    volumes:
      - gctrl-kex-models:/app/models
    depends_on:
      gctrl-agent:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl
      - ollama-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gctrl-fuse:
    image: ghcr.io/gctrl/fuse:latest
    container_name: gctrl-fuse
    restart: unless-stopped
    ports:
      - "127.0.0.1:4020:4020"
    environment:
      - NEO4J_URI=bolt://gctrl-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - REDIS_URL=redis://gctrl-redis:6379
      - PORT=4020
      - SIMILARITY_THRESHOLD=0.85
      - LIMES_URL=http://gctrl-limes:8080
    depends_on:
      gctrl-agent:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl

  gctrl-api:
    image: ghcr.io/gctrl/web:latest
    container_name: gctrl-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://gctrl:${POSTGRES_PASSWORD:-gctrl-postgres-password}@gctrl-postgres:5432/gctrl
      - REDIS_URL=redis://gctrl-redis:6379
      - NEO4J_URI=bolt://gctrl-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3001
      - KEX_WORKER_URL=http://gctrl-kex:4010
      - QDRANT_URL=http://gctrl-qdrant:6333
      - OLLAMA_BASE=http://ollama:11434
    depends_on:
      gctrl-postgres:
        condition: service_healthy
      gctrl-redis:
        condition: service_started
    networks:
      - gctrl
      - ollama-net

  gctrl-web:
    image: ghcr.io/gctrl/web:latest
    container_name: gctrl-web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - gctrl-api
    networks:
      - gctrl

  gctrl-postgres:
    image: postgres:16-alpine
    container_name: gctrl-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gctrl
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gctrl-postgres-password}
      - POSTGRES_DB=gctrl
    volumes:
      - gctrl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gctrl"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gctrl

  gctrl-redis:
    image: redis:7-alpine
    container_name: gctrl-redis
    restart: unless-stopped
    volumes:
      - gctrl-redisdata:/data
    networks:
      - gctrl

  gctrl-neo4j:
    image: neo4j:5-community
    container_name: gctrl-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-gctrl-neo4j-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - gctrl-neo4jdata:/data
    networks:
      - gctrl

  gctrl-qdrant:
    image: qdrant/qdrant:latest
    container_name: gctrl-qdrant
    restart: unless-stopped
    volumes:
      - gctrl-qdrantdata:/qdrant/storage
    networks:
      - gctrl

volumes:
  gctrl-pgdata:
  gctrl-redisdata:
  gctrl-neo4jdata:
  gctrl-qdrantdata:
  gctrl-kex-models:

networks:
  gctrl:
    driver: bridge
  ollama-net:
    external: true
    name: ollama-net
